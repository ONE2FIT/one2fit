<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One2Fit 諮詢流程</title>
<style>
    .consult-container {
        font-family: 'Helvetica Neue', Arial, sans-serif;
        max-width: 500px;
        margin: 20px auto;
        padding: 30px;
        border: 2px solid #4CAF50;
        border-radius: 20px;
        background-color: #ffffff;
        box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    }
    .consult-header {
        color: #1B4D3E; /* 森林深綠，專業感 */
        text-align: center;
        margin-bottom: 25px;
    }
    .consult-desc {
        text-align: center;
        color: #555;
        margin-bottom: 25px;
        line-height: 1.5;
    }
    .consult-link {
        display: block;
        padding: 18px;
        margin-bottom: 15px;
        border-radius: 12px;
        text-decoration: none;
        font-weight: bold;
        transition: all 0.3s ease;
        border-left: 6px solid;
    }
    /* 階段一與二：綠色系 (木) */
    .link-green {
        background: #F1F8E9;
        color: #2E7D32;
        border-color: #4CAF50;
    }
    /* 階段三：大地金色系 (土) */
    .link-gold {
        background: #FFFBF0;
        color: #B8860B;
        border-color: #D4AF37;
    }
    .consult-link:hover {
        transform: scale(1.02);
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    .footer-text {
        font-size: 0.85em;
        text-align: center;
        color: #888;
        margin-top: 30px;
    }
</style>
</head>
<body>

<div class="consult-container">
    <h2 class="consult-header">One2Fit 健康顧問地圖</h2>
    <p class="consult-desc">請選擇您目前的階段，顧問將為您規劃專屬的復康路徑：</p>
    
    <!-- 階段一 -->
    <!-- 將你的按鈕區塊改為以下格式 -->
    <a href="rehab-assessment.html" class="consult-link link-green">
    🟢 階段一：急性痛症與基礎評估
    </a>
    
    <a href="breath-rehab.html" class="consult-link link-green">
    🟢 階段二：呼吸力學復康與結構重建
    </a>
    
    <a href="advanced-pro.html" class="consult-link link-gold">
    🟡 階段三：年度健康管理 / 教練進修
    </a>
     
    
    <div class="footer-text">
        One2Fit 專業復康團隊<br>
